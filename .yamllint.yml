extends: relaxed
rules:
  trailing-spaces: disable
  line-length: disable
ignore: |
  # ghb:excluded-dirs:start - managed by github-build from config/languages.yaml; do not edit by hand
  .build/
  .bundle/
  .git/
  .gradle/
  .hg/
  .m2/
  .npm/
  .pnpm/
  .pytest_cache/
  .svn/
  .venv/
  .yarn/
  __pycache__/
  build/
  Carthage/
  coverage/
  DerivedData/
  dist/
  env/
  Libraries/
  node_modules/
  Pods/
  target/
  vendor/
  venv/
  # ghb:excluded-dirs:end
